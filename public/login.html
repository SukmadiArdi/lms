<body class="bg-background min-h-screen flex items-center justify-center p-md font-body-md text-on-surface">

<!-- Header -->
<header class="text-center flex flex-col gap-sm mb-sm">
<div class="flex justify-center mb-sm">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">school</span>

</div>
<h1 class="font-h2 text-h2 text-primary tracking-tight">Momentum LMS</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Log in to continue your learning journey.</p>
</header>
<!-- Login Form -->
<form id="loginForm" class="flex flex-col gap-sm">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<input class="border border-outline-variant rounded-lg px-sm py-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors bg-surface-container-lowest" id="email" name="email" placeholder="student@university.edu" required="" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant hover:underline transition-colors" href="#">Forgot Password?</a>
</div>
<input class="border border-outline-variant rounded-lg px-sm py-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors bg-surface-container-lowest" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex items-center gap-sm mt-xs mb-sm">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Remember me on this device</label>
</div>
<button id="loginBtn" class="bg-primary text-on-primary font-label-md text-label-md rounded-full py-sm hover:bg-on-primary-fixed transition-colors shadow-sm flex justify-center items-center gap-base" type="submit">
                Log In
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-sm font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="flex flex-col gap-sm">
<button class="flex items-center justify-center gap-sm border border-outline-variant rounded-full py-sm bg-surface-container-lowest hover:bg-surface-container-low transition-colors text-on-surface font-label-md text-label-md" type="button">
<img alt="Google logo" class="w-5 h-5" data-alt="Google brand logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7I3VBPNaFx_kxR4fHHcZmiZwaVkUc2rKHHXRh_Dic7HQClSy2B2cfOdF9mrfP4kuahwsXizf6G06XqYyvX3E6y5fyIclv7nHKtKp36B4TiKSxL96PObyFFvECzYAYGc84W-K8jmqxBHxEGkY-cU6wZ8Lsayt7uZM7Tc6VlqCksw12lCvvNFrWElFtwtGb_2nE0s9HDtgR2rUbTBn4EZ5FDUFc_njhmt13LhDgp58_WjT_HzIZavL6Hi3vF8Duv6DSykXAFaRsfUo"/>
                Log in with Google

<button class="flex items-center justify-center gap-sm border border-outline-variant rounded-full py-sm bg-surface-container-lowest hover:bg-surface-container-low transition-colors text-on-surface font-label-md text-label-md" type="button">

            </button>

<!-- Footer Link -->
<div class="text-center mt-sm pt-sm border-t border-surface-variant">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account yet? 
                <a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant hover:underline transition-colors" href="signup.html">Create account</a>
</p>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = 'Logging in...';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Something went wrong');
        
        window.location.href = 'dashboard.html';
    } catch (err) {
        alert(err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = `Log In <span class="material-symbols-outlined text-sm">arrow_forward</span>`;
    }
});
</script>
