<!DOCTYPE html>

<html lang="en"><head>

                        "background": "#f6faff",
                        "tertiary-fixed-dim": "#bfc7d3",
                        "tertiary-fixed": "#dbe3ef",
                        "surface-dim": "#d2dbe4",
                        "on-primary": "#ffffff",

                        "error": "#ba1a1a",
                        "surface-container-high": "#e0e9f2",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#2c4677",
                        "on-primary-fixed": "#001a42",
                        "surface-tint": "#455e90",
                        "primary": "#00163b",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#dbe4ed",
                        "secondary-container": "#0070ea"

                    "borderRadius": {
                        "DEFAULT": "0.125rem",

                    },
                    "spacing": {

<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background">
<main class="flex-grow flex items-center justify-center p-md">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-sm border border-surface-variant p-lg flex flex-col gap-md relative overflow-hidden z-10">
<div class="text-center space-y-sm">
<h1 class="font-h2 text-h2 text-primary">Momentum LMS</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Create your account to begin learning.</p>
</div>
<form id="signupForm" class="space-y-sm">
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="fullName">Full Name</label>
<input class="w-full border-outline-variant rounded-DEFAULT bg-surface-container-lowest px-sm py-[10px] text-body-md font-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="fullName" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<input class="w-full border-outline-variant rounded-DEFAULT bg-surface-container-lowest px-sm py-[10px] text-body-md font-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email" placeholder="you@example.com" type="email"/>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<input class="w-full border-outline-variant rounded-DEFAULT bg-surface-container-lowest px-sm py-[10px] text-body-md font-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="confirmPassword">Confirm Password</label>
<input class="w-full border-outline-variant rounded-DEFAULT bg-surface-container-lowest px-sm py-[10px] text-body-md font-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="confirmPassword" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-start gap-xs pt-xs">
<input class="mt-1 border-outline-variant rounded-DEFAULT text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant leading-tight" for="terms">
                        I agree to the <a class="text-secondary hover:text-secondary-container underline" href="#">Terms of Service</a> and <a class="text-secondary hover:text-secondary-container underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<div class="pt-sm">
<button id="signupBtn" class="w-full bg-primary text-on-primary font-label-md text-label-md py-sm rounded-DEFAULT hover:opacity-90 transition-opacity shadow-sm hover:shadow-md" type="submit">
                        Create Account
                    </button>
</div>
</form>
<div class="relative flex items-center justify-center pt-xs">
<span class="absolute bg-surface-container-lowest px-sm font-body-sm text-body-sm text-outline z-10">Or continue with</span>
<div class="w-full border-t border-surface-variant absolute"></div>
</div>
<div class="flex flex-col gap-sm">
<button class="w-full border border-outline-variant bg-surface-container-lowest text-on-surface font-label-md text-label-md py-[10px] rounded-DEFAULT hover:bg-surface-container-low transition-colors flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">login</span>
                    Google
                </button>
<button class="w-full border border-outline-variant bg-surface-container-lowest text-on-surface font-label-md text-label-md py-[10px] rounded-DEFAULT hover:bg-surface-container-low transition-colors flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">work</span>
                    LinkedIn
                </button>
</div>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant pt-xs">
                Already have an account? <a class="text-primary font-label-md text-label-md hover:underline" href="login.html">Log In</a>
</p>
</div>
</main>
<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    btn.disabled = true;
    btn.innerText = 'Creating account...';

    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
        alert('Passwords do not match');
        btn.disabled = false;
        btn.innerText = 'Create Account';
        return;
    }

    try {
        const res = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fullName, email, password })
        });
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Something went wrong');
        
        alert('Account created successfully! Please log in.');
        window.location.href = 'login.html';
    } catch (err) {
        alert(err.message);
    } finally {
        btn.disabled = false;
        btn.innerText = 'Create Account';
    }
});
</script>
</body></html>
